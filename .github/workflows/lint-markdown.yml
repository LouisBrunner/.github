name: Lint Markdown

on:
  workflow_call:
    inputs:
      path:
        description: "Path glob to check (default: entire repo)"
        type: string
        default: "**/*.{md,markdown}"
      config:
        description: "Inline markdownlint config JSON (empty = use .markdownlint* in repo or built-in defaults)"
        type: string
        default: ""

jobs:
  lint:
    name: markdownlint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: ${{ inputs.path }}
          config: ${{ inputs.config }}
