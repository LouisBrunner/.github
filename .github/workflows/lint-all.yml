# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint all files

on:
  workflow_call:
    inputs:
      skip_shell:
        type: boolean
        default: false
        description: "Whether to skip shell linting"
      with_rust:
        type: boolean
        default: false
        description: "Whether the project contains Rust files"

# TODO: merge all linting in this and make bun/go/rust/uv/tf into test/build focused workflows

permissions: {}

jobs:
  biome-skip:
    name: Biome skip check
    permissions:
      contents: read
      actions: read
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.jsonc?", "**/*.[mc]?[tj]sx?", "**/*.s?[ca]ss", "**/*.html"]'

  # TODO: replace with super after validating if it works for us
  biome:
    name: Biome
    needs: biome-skip
    if: ${{ needs.biome-skip.outputs.should_skip != 'true' }}
    permissions:
      contents: read
    uses: LouisBrunner/.github/.github/workflows/lint-biome.yml@main
    with:
      path: "."
      version: "2.5.0"

  toml-skip:
    name: TOML skip check
    permissions:
      contents: read
      actions: read
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.toml"]'

  toml:
    name: TOML
    needs: toml-skip
    if: ${{ needs.toml-skip.outputs.should_skip != 'true' }}
    permissions:
      contents: read
    uses: LouisBrunner/.github/.github/workflows/lint-toml.yml@main

  sh-skip:
    name: Shell skip check
    if: ${{ inputs.skip_shell != 'true' }}
    permissions:
      contents: read
      actions: read
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.sh"]'

  # TODO: super handles it but with wrong files
  sh:
    name: Shell
    needs: sh-skip
    if: ${{ needs.sh-skip.outputs.should_skip != 'true' }}
    permissions:
      contents: read
    uses: LouisBrunner/.github/.github/workflows/lint-sh.yml@main
    with:
      path: "."
      shfmt-version: "3.13.1"
      shellcheck-version: "v0.11.0"

  docker-skip:
    name: Docker skip check
    permissions:
      contents: read
      actions: read
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/Dockerfile", "**/Dockerfile.*"]'

  docker:
    name: Docker
    needs: docker-skip
    if: ${{ needs.docker-skip.outputs.should_skip != 'true' }}
    permissions:
      contents: read
    uses: LouisBrunner/.github/.github/workflows/lint-docker.yml@main
    with:
      path: "."
      dockerfmt-version: "v0.5.4"
      options: "--newline -i 2"

  super-linter:
    name: Super Linter
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    uses: LouisBrunner/.github/.github/workflows/lint-super.yml@main
    with:
      slim: ${{ !inputs.with_rust }}
