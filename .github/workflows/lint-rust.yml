name: Lint Rust

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use (e.g. 'stable', 'nightly', '1.80.0')"
        type: string
        default: "stable"
      run:
        description: "Lint command to run (empty = default: cargo fmt --check + cargo clippy)."
        type: string
        default: ""

permissions: {}

jobs:
  lint:
    name: Vet
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # no tags
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt, clippy

      - name: Vet
        shell: bash
        env:
          CUSTOM_RUN: ${{ inputs.run }}
        run: |
          if [ -n "$CUSTOM_RUN" ]; then
            # FIXME: eval... need to be careful with those
            eval "$CUSTOM_RUN"
          else
            cargo fmt --check
            cargo clippy -- -D warnings
          fi
