name: Lint Bun

on:
  workflow_call:
    inputs:
      bun-version:
        description: "Bun version to use (empty = latest stable)"
        type: string
        default: ""
      run:
        description: "Lint command to run (empty = default: bun run lint:ci)."
        type: string
        default: ""

jobs:
  lint:
    name: Vet
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version != '' && inputs.bun-version || 'latest' }}
          no-cache: false

      - name: Install dependencies
        run: bun install

      - name: Vet
        shell: bash
        env:
          CUSTOM_RUN: ${{ inputs.run }}
        run: |
          if [ -n "$CUSTOM_RUN" ]; then
            # FIXME: eval... need to be careful with those
            eval "$CUSTOM_RUN"
          else
            bun run vet:ci
          fi
