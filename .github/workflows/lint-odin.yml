# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint Odin

on:
  workflow_call:
    inputs:
      path:
        description: "Root path to check (default: entire repo)"
        type: string
        default: "."
      odin-release:
        description: "Odin release to install (see laytan/setup-odin)"
        type: string
        default: "dev-2026-07a"
      ols-ref:
        description: "Git tag of DanielGavin/ols to build odinfmt from"
        type: string
        default: "dev-2026-06"
      run:
        description: "Lint command to run (empty = default: odinfmt/odin check)."
        type: string
        default: ""

permissions: {}

jobs:
  lint:
    name: Vet
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Odin
        uses: laytan/setup-odin@8536d8fa450ec6f1bd9ddc84bbaaf16296c0051d # v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: ${{ inputs.odin-release }}

      - name: Build odinfmt
        uses: LouisBrunner/.github/.github/actions/build-odin-tool@main
        with:
          url: https://github.com/DanielGavin/ols.git
          ref: ${{ inputs.ols-ref }}
          source: tools/odinfmt/main.odin
          binary-name: odinfmt
          build-args: "-file -collection:src=src"
          cache-key-extra: ${{ inputs.odin-release }}

      - name: Vet
        shell: bash
        env:
          CUSTOM_RUN: ${{ inputs.run }}
          SEARCH_PATH: ${{ inputs.path }}
        run: |
          if [ -n "$CUSTOM_RUN" ]; then
            # FIXME: eval... need to be careful with those
            eval "$CUSTOM_RUN"
          else
            odinfmt -w "$SEARCH_PATH"
            git diff --exit-code -- '*.odin'
            odin check "$SEARCH_PATH" -vet -strict-style -vet-tabs -disallow-do -warnings-as-errors
          fi
