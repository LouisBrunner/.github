name: Lint Docker

on:
  workflow_call:
    inputs:
      path:
        description: "Root path to search for Dockerfiles (default: entire repo)"
        type: string
        default: "."
      dockerfmt-version:
        description: "dockerfmt version to install"
        type: string
        default: "v0.5.4"
      options:
        description: "Extra options to pass to dockerfmt"
        type: string
        default: "--newline -i 2"

permissions: {}

jobs:
  lint:
    name: dockerfmt
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dockerfmt
        env:
          DOCKERFMT_VERSION: ${{ inputs.dockerfmt-version }}
        run: |
          base_url="https://github.com/reteps/dockerfmt/releases/download/${DOCKERFMT_VERSION}"
          curl -fsSL "${base_url}/dockerfmt-${DOCKERFMT_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin dockerfmt

      - name: Check formatting (dockerfmt)
        env:
          SEARCH_PATH: ${{ inputs.path }}
          DOCKERFMT_OPTIONS: ${{ inputs.options }}
        run: |
          mapfile -t files < <(find "$SEARCH_PATH" -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \))
          if [ ${#files[@]} -gt 0 ]; then
            read -ra opts <<< "$DOCKERFMT_OPTIONS"
            dockerfmt --check "${opts[@]}" "${files[@]}"
          fi
