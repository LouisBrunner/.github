# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build and push with ko

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Path to go.mod to derive the Go version."
        type: string
        default: "go.mod"
      ko-version:
        description: "ko version to install."
        type: string
        default: "v0.15.4"
      registry:
        description: "Container registry to log in to."
        type: string
        required: true
      registry-username:
        description: "Username for the container registry."
        type: string
        required: true
      run:
        description: "Command to run after setup (empty = skip)."
        type: string
        default: ""
    secrets:
      registry-password:
        description: "Password or token for the container registry."
        required: true

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout and set up Go
        uses: LouisBrunner/.github/.github/actions/checkout-go@main
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Set up ko
        uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10
        with:
          version: ${{ inputs.ko-version }}

      - name: Login to container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry-username }}
          password: ${{ secrets.registry-password }}

      - name: Run
        if: ${{ inputs.run != '' }}
        shell: bash
        env:
          CUSTOM_RUN: ${{ inputs.run }}
        run: |
          # FIXME: eval... need to be careful with those
          eval "$CUSTOM_RUN"
