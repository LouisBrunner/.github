name: Lint Shell

on:
  workflow_call:
    inputs:
      path:
        description: "Root path to search for shell scripts (default: entire repo)"
        type: string
        default: "."
      additional-files:
        description: "Extra files to check regardless of shebang (space-separated paths)"
        type: string
        default: ""
      shellcheck-options:
        description: "Additional options to pass to shellcheck"
        type: string
        default: ""
      shfmt-version:
        description: "shfmt version to install"
        type: string
        default: "3.13.1"
      shellcheck-version:
        description: "shellcheck version to install"
        type: string
        default: "v0.11.0"

permissions: {}

jobs:
  lint:
    name: shfmt + shellcheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up shfmt
        uses: mfinelli/setup-shfmt@a25fda4c1fe115aec0f85e04126610841bc3141d # v4.0.1
        with:
          shfmt-version: ${{ inputs.shfmt-version }}

      - name: Gather additional shell scripts
        id: extra
        env:
          SEARCH_PATH: ${{ inputs.path }}
          ADDITIONAL_FILES: ${{ inputs.additional-files }}
        run: |
          by_directive=$(find "$SEARCH_PATH" -type f ! -name "*.*" -print0 \
            | xargs -0 grep -lE '# shellcheck shell=' 2>/dev/null | tr '\n' ' ')
          extra=$(echo "$ADDITIONAL_FILES $by_directive" \
            | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ' ')
          suffixes=$(echo "$extra" | tr ' ' '\n' | grep -v '^$' | xargs -r -n1 basename | sort -u | tr '\n' ' ')
          echo "files=$extra" >> "$GITHUB_OUTPUT"
          echo "suffixes=$suffixes" >> "$GITHUB_OUTPUT"

      - name: Check formatting (shfmt)
        env:
          SEARCH_PATH: ${{ inputs.path }}
          EXTRA_FILES: ${{ steps.extra.outputs.files }}
        run: |
          shfmt --diff "$SEARCH_PATH"
          read -ra extra <<< "$EXTRA_FILES"
          test -z "${extra[@]}" || shfmt --language-dialect bash --diff "${extra[@]}"

      - name: Lint (shellcheck)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          SHELLCHECK_OPTS: ${{ inputs.shellcheck-options }}
        with:
          scandir: ${{ inputs.path }}
          version: ${{ inputs.shellcheck-version }}
          additional_files: ${{ steps.extra.outputs.suffixes }}
          check_together: true
