name: Lint configs

on:
  workflow_call:
    inputs:
      run-yaml:
        description: "Run yamllint"
        type: boolean
        default: true
      yaml:
        description: "JSON overrides for lint-yaml (keys: path, config-data)"
        type: string
        default: "{}"
      run-biome:
        description: "Run Biome (JSON/HTML/JS/TS/CSS)"
        type: boolean
        default: true
      biome:
        description: "JSON overrides for lint-biome (keys: path, version)"
        type: string
        default: "{}"
      run-toml:
        description: "Run Tombi (requires tombi.toml in repo root)"
        type: boolean
        default: true
      toml:
        description: "JSON overrides for lint-toml (currently no overrides supported)"
        type: string
        default: "{}"
      run-markdown:
        description: "Run markdownlint"
        type: boolean
        default: true
      markdown:
        description: "JSON overrides for lint-markdown (keys: path, config)"
        type: string
        default: "{}"
      run-sh:
        description: "Run shfmt + shellcheck"
        type: boolean
        default: true
      sh:
        description: "JSON overrides for lint-sh (keys: path, shfmt-version, shellcheck-version)"
        type: string
        default: "{}"
      run-docker:
        description: "Run dockerfmt"
        type: boolean
        default: true
      docker:
        description: "JSON overrides for lint-docker (keys: path, dockerfmt-version, options)"
        type: string
        default: "{}"
      run-gha:
        description: "Run actionlint"
        type: boolean
        default: true
      gha:
        description: "JSON overrides for lint-gha (keys: version)"
        type: string
        default: "{}"
      run-super:
        description: "Run super-linter"
        type: boolean
        default: true

jobs:
  yaml-skip:
    name: YAML skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.ya?ml"]'

  yaml:
    name: YAML
    needs: yaml-skip
    if: ${{ inputs.run-yaml && needs.yaml-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-yaml.yml@main
    with:
      path: ${{ fromJSON(inputs.yaml).path || '.' }}
      config-data: ${{ fromJSON(inputs.yaml)['config-data'] || '' }}

  biome-skip:
    name: Biome skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.jsonc?", "**/*.[mc]?[tj]sx?", "**/*.s?[ca]ss", "**/*.html"]'

  biome:
    name: Biome
    needs: biome-skip
    if: ${{ inputs.run-biome && needs.biome-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-biome.yml@main
    with:
      path: ${{ fromJSON(inputs.biome).path || '.' }}
      version: ${{ fromJSON(inputs.biome).version || '2.5.0' }}

  toml-skip:
    name: TOML skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.toml"]'

  toml:
    name: TOML
    needs: toml-skip
    if: ${{ inputs.run-toml && needs.toml-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-toml.yml@main

  markdown-skip:
    name: Markdown skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.{md,markdown}"]'

  markdown:
    name: Markdown
    needs: markdown-skip
    if: ${{ inputs.run-markdown && needs.markdown-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-markdown.yml@main
    with:
      path: ${{ fromJSON(inputs.markdown).path || '**/*.{md,markdown}' }}
      config: ${{ fromJSON(inputs.markdown).config || '' }}

  sh-skip:
    name: Shell skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.sh"]'

  sh:
    name: Shell
    needs: sh-skip
    if: ${{ inputs.run-sh && needs.sh-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-sh.yml@main
    with:
      path: ${{ fromJSON(inputs.sh).path || '.' }}
      shfmt-version: ${{ fromJSON(inputs.sh)['shfmt-version'] || '3.13.1' }}
      shellcheck-version: ${{ fromJSON(inputs.sh)['shellcheck-version'] || 'v0.11.0' }}

  docker-skip:
    name: Docker skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/Dockerfile", "**/Dockerfile.*"]'

  docker:
    name: Docker
    needs: docker-skip
    if: ${{ inputs.run-docker && needs.docker-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-docker.yml@main
    with:
      path: ${{ fromJSON(inputs.docker).path || '.' }}
      dockerfmt-version: ${{ fromJSON(inputs.docker)['dockerfmt-version'] || 'v0.5.4' }}
      options: ${{ fromJSON(inputs.docker).options || '--newline -i 2' }}

  gha-skip:
    name: GHA skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '[".github/**"]'

  gha:
    name: GHA
    needs: gha-skip
    if: ${{ inputs.run-gha && needs.gha-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-gha.yml@main
    with:
      version: ${{ fromJSON(inputs.gha).version || '1.7.12' }}

  super-linter:
    name: Super Linter
    if: ${{ inputs.run-super }}
    permissions:
      contents: read
      statuses: write
    uses: LouisBrunner/.github/.github/workflows/lint-super.yml@main
