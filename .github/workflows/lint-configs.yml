name: Lint configs

on:
  workflow_call:
    inputs:
      run-yaml:
        description: "Run yamllint"
        type: boolean
        default: true
      yaml:
        description: "JSON overrides for lint-yaml (keys: path, config-data)"
        type: string
        default: "{}"
      run-biome:
        description: "Run Biome (JSON/HTML/JS/TS/CSS)"
        type: boolean
        default: true
      biome:
        description: "JSON overrides for lint-biome (keys: path, version)"
        type: string
        default: "{}"
      run-toml:
        description: "Run Tombi (requires tombi.toml in repo root)"
        type: boolean
        default: true
      toml:
        description: "JSON overrides for lint-toml (currently no overrides supported)"
        type: string
        default: "{}"
      run-markdown:
        description: "Run markdownlint"
        type: boolean
        default: true
      markdown:
        description: "JSON overrides for lint-markdown (keys: path, config)"
        type: string
        default: "{}"
      run-sh:
        description: "Run shfmt + shellcheck"
        type: boolean
        default: true
      sh:
        description: "JSON overrides for lint-sh (keys: path, shfmt-version, shellcheck-version)"
        type: string
        default: "{}"

jobs:
  yaml-skip:
    name: YAML skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.ya?ml"]'

  yaml:
    name: YAML
    needs: yaml-skip
    if: ${{ inputs.run-yaml && needs.yaml-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-yaml.yml@main
    with:
      path: ${{ fromJSON(inputs.yaml).path || '.' }}
      config-data: ${{ fromJSON(inputs.yaml)['config-data'] || '' }}

  biome-skip:
    name: Biome skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.jsonc?", "**/*.[mc]?[tj]sx?", "**/*.s?[ca]ss", "**/*.html"]'

  biome:
    name: Biome
    needs: biome-skip
    if: ${{ inputs.run-biome && needs.biome-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-biome.yml@main
    with:
      path: ${{ fromJSON(inputs.biome).path || '.' }}
      version: ${{ fromJSON(inputs.biome).version || '2.5.0' }}

  toml-skip:
    name: TOML skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.toml"]'

  toml:
    name: TOML
    needs: toml-skip
    if: ${{ inputs.run-toml && needs.toml-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-toml.yml@main

  markdown-skip:
    name: Markdown skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.{md,markdown}"]'

  markdown:
    name: Markdown
    needs: markdown-skip
    if: ${{ inputs.run-markdown && needs.markdown-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-markdown.yml@main
    with:
      path: ${{ fromJSON(inputs.markdown).path || '**/*.{md,markdown}' }}
      config: ${{ fromJSON(inputs.markdown).config || '' }}

  sh-skip:
    name: Shell skip check
    uses: LouisBrunner/.github/.github/workflows/skip-check.yml@main
    with:
      paths: '["**/*.sh"]'

  sh:
    name: Shell
    needs: sh-skip
    if: ${{ inputs.run-sh && needs.sh-skip.outputs.should_skip != 'true' }}
    uses: LouisBrunner/.github/.github/workflows/lint-sh.yml@main
    with:
      path: ${{ fromJSON(inputs.sh).path || '.' }}
      shfmt-version: ${{ fromJSON(inputs.sh)['shfmt-version'] || 'v3.13.1' }}
      shellcheck-version: ${{ fromJSON(inputs.sh)['shellcheck-version'] || 'v0.11.0' }}
