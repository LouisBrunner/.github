# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint (super-linter)

on:
  workflow_call:
    inputs:
      slim:
        type: boolean
        default: true
        description: "Whether to use the slim version of super-linter"

permissions: {}

jobs:
  lint:
    name: super-linter
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LINTER_RULES_PATH: .
      ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
      SAVE_SUPER_LINTER_SUMMARY: true
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load configs from LouisBrunner/.github
        env:
          BASE_URL: https://raw.githubusercontent.com/LouisBrunner/.github/main
        run: |
          curl -fsSL "$BASE_URL/boilerplate/super-config.env" \
            | grep -v '^#' | grep -v '^$' | sed 's/="\(.*\)"$/=\1/' >> "$GITHUB_ENV"
          TO_COPY=(
            .jscpd.json
            .markdown-lint.yaml
            .yaml-lint.yaml
            .zizmor.yaml
            .textlintrc
          )
          for file in "${TO_COPY[@]}"; do
            [ -f "$file" ] || curl -fsSL "$BASE_URL/$file" -o "$file"
          done
          [ -f .github/super-linter.env ] && cat .github/super-linter.env >> "$GITHUB_ENV" || true

      - name: Lint # FIXME: would be nice to have a conditional but GHA pulls both anyway
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
