# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint Go

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Path to go.mod to derive the Go version."
        type: string
        default: "go.mod"
      run:
        description: "Lint command to run (empty = default: gofmt + vet + staticcheck)."
        type: string
        default: ""
      generate:
        description: "Run go generate before linting."
        type: boolean
        default: false
      runs-on:
        description: "The runner to use for this job."
        type: string
        default: "ubuntu-24.04"

permissions: {}

jobs:
  lint:
    name: Vet
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout and set up Go
        uses: LouisBrunner/.github/.github/actions/checkout-go@main
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Generate
        if: ${{ inputs.generate }}
        shell: bash
        run: go generate ./...

      - name: Vet
        shell: bash
        env:
          CUSTOM_RUN: ${{ inputs.run }}
        run: |
          if [ -n "$CUSTOM_RUN" ]; then
            # FIXME: eval... need to be careful with those
            eval "$CUSTOM_RUN"
          else
            gofmt -d -e -s . | tee /dev/stderr | awk 'END { if (NR > 0) { exit 1 } }'
            go vet ./...
            go tool honnef.co/go/tools/cmd/staticcheck ./...
          fi
