name: Lint Go

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Path to go.mod to derive the Go version."
        type: string
        default: "go.mod"
      run:
        description: "Lint command to run (empty = default: gofmt + vet + staticcheck)."
        type: string
        default: ""
      runs-on:
        description: "The runner to use for this job."
        type: string
        default: "ubuntu-24.04"

permissions: {}

jobs:
  lint:
    name: Vet
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: LouisBrunner/.github/.github/actions/setup-go@main
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Vet
        shell: bash
        env:
          CUSTOM_RUN: ${{ inputs.run }}
        run: |
          if [ -n "$CUSTOM_RUN" ]; then
            # FIXME: eval... need to be careful with those
            eval "$CUSTOM_RUN"
          else
            gofmt -d -e -s . | tee /dev/stderr | awk 'END { if (NR > 0) { exit 1 } }'
            go vet ./...
            go tool honnef.co/go/tools/cmd/staticcheck ./...
          fi
