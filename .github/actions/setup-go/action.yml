name: Set up Go
description: Install Go. Caller must checkout the repository first.

inputs:
  go-version-file:
    description: "Path to go.mod to derive the Go version"
    required: false
    default: "go.mod"

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: true
