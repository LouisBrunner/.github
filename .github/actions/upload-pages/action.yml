# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Upload GitHub Pages artifact
description: >
  Configure Pages and upload a directory as the GitHub Pages deployment artifact.
  Must be used in a job with permissions: pages: write, id-token: write.
  Call the deploy-pages reusable workflow in a subsequent job to complete the deployment.

inputs:
  path:
    description: "Directory to upload as the Pages artifact"
    required: false
    default: "dist"

runs:
  using: composite
  steps:
    - name: Configure Pages
      uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
      with:
        path: ${{ inputs.path }}
