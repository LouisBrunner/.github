name: Build Bun+Go project
description: >
  Install dependencies and build a Bun project that uses Go (esbuild) internally.
  Caller must checkout the repository first.

inputs:
  bun-version:
    description: "Bun version to use"
    required: false
    default: ""
  go-version-file:
    description: "Path to go.mod to derive the Go version"
    required: false
    default: "go.mod"
  run:
    description: "Command to run (empty = default: bun install + bun run build)."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: ./.github/actions/setup-bun
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Set up Go
      uses: ./.github/actions/setup-go
      with:
        go-version-file: ${{ inputs.go-version-file }}

    - name: Build
      shell: bash
      env:
        CUSTOM_RUN: ${{ inputs.run }}
      run: |
        if [ -n "$CUSTOM_RUN" ]; then
          # FIXME: eval... need to be careful with those
          eval "$CUSTOM_RUN"
        else
          bun install
          bun run build
        fi
