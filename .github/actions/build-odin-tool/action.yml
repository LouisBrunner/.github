# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Build Odin tool
description: >
  Clone an Odin tool's repository and build a binary from it onto /usr/local/bin, cached by ref.
  Caller must set up Odin first.

inputs:
  url:
    description: "Git URL to clone the tool's repository from"
    required: true
  ref:
    description: "Git tag/branch to clone"
    required: true
  source:
    description: "Path (file or directory) passed to 'odin build'"
    required: true
  binary-name:
    description: "Name of the binary 'odin build' produces and installs onto PATH"
    required: true
  build-args:
    description: "Extra arguments to pass to 'odin build'"
    required: false
    default: ""
  cache-key-extra:
    description: "Extra string to fold into the cache key (e.g. the Odin compiler version)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Build ${{ inputs.binary-name }}
      uses: LouisBrunner/.github/.github/actions/build-cache@main
      env:
        TOOL_URL: ${{ inputs.url }}
        TOOL_REF: ${{ inputs.ref }}
        TOOL_SOURCE: ${{ inputs.source }}
        TOOL_BINARY_NAME: ${{ inputs.binary-name }}
        TOOL_BUILD_ARGS: ${{ inputs.build-args }}
      with:
        path: /usr/local/bin/${{ inputs.binary-name }}
        key: >-
          odin-tool
          -${{ runner.os }}
          -${{ inputs.binary-name }}-${{ inputs.url }}-${{ inputs.ref }}
          -${{inputs.cache-key-extra }}
        run: |
          clone_dir="$(mktemp -d)"
          git clone --depth 1 --branch "$TOOL_REF" "$TOOL_URL" "$clone_dir"
          (cd "$clone_dir" && odin build "$TOOL_SOURCE" -out:"$TOOL_BINARY_NAME" -o:speed $TOOL_BUILD_ARGS)
          install "$clone_dir/$TOOL_BINARY_NAME" /usr/local/bin/"$TOOL_BINARY_NAME"
