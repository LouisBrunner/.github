name: Report test results
description: >
  Publish JUnit XML and/or Cobertura XML reports as GitHub check annotations.
  Caller must checkout the repository and run tests first.

inputs:
  junit-file:
    description: "Path to JUnit XML report (omit to skip)"
    required: false
    default: ""
  cobertura-file:
    description: "Path to Cobertura XML coverage report (omit to skip)"
    required: false
    default: ""
  token:
    description: "GitHub token (defaults to GITHUB_TOKEN)"
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Publish JUnit report
      if: ${{ inputs.junit-file != '' }}
      uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
      with:
        report_paths: ${{ inputs.junit-file }}
        token: ${{ inputs.token }}

    - name: Publish Cobertura coverage
      if: ${{ inputs.cobertura-file != '' }}
      uses: 5monkeys/cobertura-action@ee5787cc56634acddedc51f21c7947985531e6eb # v14
      with:
        path: ${{ inputs.cobertura-file }}
        minimum_coverage: 0
