name: Set up Bun
description: Install Bun. Caller must checkout the repository first.

inputs:
  bun-version:
    description: "Bun version to use"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version != '' && inputs.bun-version || '1.3.14' }}
        no-cache: false
